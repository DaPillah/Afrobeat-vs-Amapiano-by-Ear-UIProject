<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Afrobeat vs Amapiano</title>
    <link rel="stylesheet" href="/assets/css/styles.css" />
  </head>
  <body data-page="home">
    <main class="page-shell">
      <header class="hero">
        <p class="eyebrow">Interactive prototype</p>
        <h1 id="page-title">Loading...</h1>
        <p id="page-tagline" class="lead"></p>
      </header>

      <section class="panel">
        <div class="section-heading">
          <h2>Choose a route</h2>
          <p>Use these entry points to move through the prototype.</p>
        </div>
        <div id="route-grid" class="card-grid"></div>
      </section>

      <section class="panel split-panel">
        <div>
          <div class="section-heading">
            <h2>Team roles</h2>
            <p>Each section can grow independently while staying connected.</p>
          </div>
          <ul id="team-list" class="team-list"></ul>
        </div>

        <div>
          <div class="section-heading">
            <h2>Shared contract</h2>
            <p>These notes help everyone build on the same foundation.</p>
          </div>
          <ul id="contract-list" class="contract-list"></ul>
        </div>
      </section>
    </main>

    <script src="/assets/js/app.js" defer></script>
  </body>
</html>
